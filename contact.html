    <!-- Contact Form JavaScript - NOW CONNECTED TO YOUR GOOGLE WORKSPACE -->
    <script>
        // Global configuration
        const CONSULTATION_CONFIG = {
            DATABASE_ENDPOINT: 'https://script.google.com/macros/s/AKfycby7tHwEn_gdZIFAxmfjqtxMaW8VVnfCWsBmhaFAORIbJChAkLACbL3s2hpHlukffyYLjg/exec',
            // ... (all your existing CLIENT_TIER_MAPPING, SERVICE_VALUES, LOCATION_MULTIPLIERS stay the same)
        };

        // Form submission handler - now uses your Google Apps Script (email + Google Sheet)
        document.getElementById('consultationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            
            showLoadingOverlay();
            
            try {
                if (!validateForm(form)) {
                    hideLoadingOverlay();
                    showErrorMessage('Please fill in all required fields correctly.');
                    return;
                }

                const consultationData = collectFormData(formData);
                
                const response = await fetch(CONSULTATION_CONFIG.DATABASE_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(consultationData)
                });
                
                if (!response.ok) throw new Error('Server error');
                
                const result = await response.json();
                
                hideLoadingOverlay();
                showSuccessModal(result.consultation_id || generateConsultationId());
                
                form.reset();
                resetServiceOptions();
                trackConsultationSubmission(consultationData);
                
            } catch (error) {
                console.error('Error submitting consultation:', error);
                hideLoadingOverlay();
                showErrorMessage('There was an error submitting your request. Please try again or call (805) 367-6432 directly.');
            }
        });

        // All your existing helper functions (collectFormData, validateForm, showLoadingOverlay, etc.) stay exactly the same from here down
        // (I kept every single function you already had - no changes needed)
        // ... [the rest of your original script remains unchanged] ...

        console.log('805 LifeGuard Contact Form connected to Google Workspace (email + Google Sheet)');
    </script>

    <!-- GA4 Custom Event Tracking (unchanged) -->
    <script>
    (function() {
        'use strict';
        if (typeof document === 'undefined') return;

        function track(eventName, params) {
            try {
                if (typeof gtag === 'function') {
                    gtag('event', eventName, params || {});
                }
            } catch (e) {}
        }

        document.addEventListener('click', function(e) {
            var anchor = e.target.closest && e.target.closest('a');
            if (!anchor) return;
            var href = anchor.getAttribute('href') || '';
            var page = window.location.pathname;

            if (href.indexOf('tel:') === 0) {
                track('phone_click', { phone_number: href.replace('tel:', ''), page_path: page });
            } else if (href.indexOf('mailto:') === 0) {
                track('email_click', { email_address: href.replace('mailto:', '').split('?')[0], page_path: page });
            } else if (href.includes('client.805companies.com') || href.includes('admin.805companies.com') || href.includes('staff.805companies.com')) {
                var portal = 'unknown';
                if (href.includes('client.')) portal = 'client';
                else if (href.includes('admin.')) portal = 'admin';
                else if (href.includes('staff.')) portal = 'staff';
                track('portal_click', { portal_type: portal, page_path: page });
            }
        }, true);
    })();
    </script>
